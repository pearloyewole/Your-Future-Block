# Catalog of every dataset RiskLens ingests. The pipeline scripts read this
# instead of hard-coding URLs, so updating an endpoint is a one-line change.
# `notes` is for humans; `auto_download` of false means "open the URL in a
# browser, save the file under the named path", because some agencies require
# clickwrap or session cookies that aren't worth scripting.

la_county_boundary:
  url: "https://opendata.arcgis.com/api/v3/datasets/10f50e6cce4d4d0fb16a8e6c0c3b71d1_0/downloads/data?format=geojson&spatialRefId=4326"
  out: "boundaries/la_county.geojson"
  auto_download: true
  notes: "LA County boundary from LA County GeoHub."

census_tracts_ca:
  url: "https://www2.census.gov/geo/tiger/TIGER2023/TRACT/tl_2023_06_tract.zip"
  out: "boundaries/tl_2023_06_tract.zip"
  auto_download: true
  notes: "TIGER/Line 2023 California tracts. Filtered to LA County (FIPS 06037) downstream."

calfire_fhsz:
  url: "https://osfm.fire.ca.gov/media/y3pbu5vd/fhsz_sra_lra_combined.zip"
  out: "wildfire/fhsz.zip"
  auto_download: false
  notes: "CAL FIRE Fire Hazard Severity Zones (SRA + LRA). Verify current URL on osfm.fire.ca.gov."

calfire_wui:
  url: "https://data.ca.gov/dataset/wildland-urban-interface"
  out: "wildfire/wui.zip"
  auto_download: false
  notes: "CA WUI dataset. Page links the actual shapefile."

calfire_perimeters:
  url: "https://frap.fire.ca.gov/frap-projects/fire-perimeters/"
  out: "wildfire/fire_perimeters.zip"
  auto_download: false
  notes: "CAL FIRE FRAP perimeters geodatabase."

fema_nfhl:
  url: "https://hazards.fema.gov/nfhlv2/output/County/06037C_NFHL.zip"
  out: "flood/06037C_NFHL.zip"
  auto_download: true
  notes: "FEMA NFHL for LA County."

noaa_slr:
  url: "https://coast.noaa.gov/slrdata/Depth_Rasters/CA/index.html"
  out: "flood/noaa_slr_la.zip"
  auto_download: false
  notes: "NOAA SLR depth rasters + inundation polygons (CA southern). Save the LA-area tile."

usgs_3dep:
  url: "https://prd-tnm.s3.amazonaws.com/?prefix=StagedProducts/Elevation/13/TIFF/n34w118/"
  out: "elevation/3dep_la.tif"
  auto_download: false
  notes: "USGS 3DEP 1/3 arc-second DEM tile(s) covering LA bbox."

nlcd_impervious:
  url: "https://www.mrlc.gov/data/nlcd-2021-impervious-conus"
  out: "landcover/nlcd_2021_impervious_conus.tif"
  auto_download: false
  notes: "NLCD 2021 impervious surface CONUS. Clip to ROI in the pipeline."

nlcd_canopy:
  url: "https://www.mrlc.gov/data/nlcd-2021-tree-canopy-conus"
  out: "landcover/nlcd_2021_canopy_conus.tif"
  auto_download: false
  notes: "NLCD 2021 tree canopy CONUS."

cdc_svi:
  url: "https://svi.cdc.gov/Documents/Data/2022/csv/states/California.csv"
  out: "vulnerability/svi_2022_ca.csv"
  auto_download: true
  notes: "CDC SVI 2022 California, tract-level."

fema_nri:
  url: "https://hazards.fema.gov/nri/Content/StaticDocuments/DataDownload/NRI_Table_CensusTracts_California.zip"
  out: "vulnerability/nri_ca_tracts.zip"
  auto_download: true
  notes: "FEMA NRI tract-level for California."

census_lodes_ca_wac:
  url: "https://lehd.ces.census.gov/data/lodes/LODES8/ca/wac/ca_wac_S000_JT00_2021.csv.gz"
  out: "exposure/ca_wac_S000_JT00_2021.csv.gz"
  auto_download: true
  notes: "Census LODES 2021 California workplace area characteristics."

la_metro_gtfs:
  url: "https://gitlab.com/LACMTA/gtfs_bus/-/raw/master/gtfs_bus.zip"
  out: "exposure/la_metro_gtfs.zip"
  auto_download: true
  notes: "LA Metro static GTFS."

# Cal-Adapt is streamed directly from S3 in pipeline/10_climate_loca2.py;
# nothing to download up front.
